<!DOCTYPE html>
<html lang="vi">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Văn Khiêm — Profile</title>
  <link href="https://fonts.googleapis.com/css2?family=Cinzel+Decorative:wght@700&family=Rajdhani:wght@300;500;700&family=Share+Tech+Mono&display=swap" rel="stylesheet"/>
  <style>
    :root {
      --bg:        #0a0a0f;
      --surface:   #111118;
      --card:      #16161f;
      --border:    #2a2a3a;
      --accent1:   #c0a060;
      --accent2:   #7060c0;
      --accent3:   #305080;
      --text:      #d8d0c8;
      --muted:     #706860;
      --glow1:     rgba(192,160,96,.35);
      --glow2:     rgba(112,96,192,.35);
    }

    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      background: var(--bg);
      color: var(--text);
      font-family: 'Rajdhani', sans-serif;
      min-height: 100vh;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      padding: 2rem 1rem 4rem;
      overflow-x: hidden;
      position: relative;
    }

    /* ── Background grid texture ── */
    body::before {
      content: '';
      position: fixed; inset: 0;
      background-image:
        linear-gradient(var(--border) 1px, transparent 1px),
        linear-gradient(90deg, var(--border) 1px, transparent 1px);
      background-size: 48px 48px;
      opacity: .18;
      pointer-events: none;
      z-index: 0;
    }

    /* ── Ambient blobs ── */
    body::after {
      content: '';
      position: fixed; inset: 0;
      background:
        radial-gradient(ellipse 60% 40% at 20% 30%, rgba(112,96,192,.12) 0%, transparent 70%),
        radial-gradient(ellipse 50% 50% at 80% 70%, rgba(192,160,96,.10) 0%, transparent 70%);
      pointer-events: none;
      z-index: 0;
    }

    .container {
      position: relative;
      z-index: 1;
      width: 100%;
      max-width: 460px;
    }

    /* ── Welcome banner ── */
    .welcome {
      text-align: center;
      font-family: 'Share Tech Mono', monospace;
      font-size: .82rem;
      letter-spacing: .22em;
      text-transform: uppercase;
      color: var(--accent1);
      margin-bottom: 2.4rem;
      animation: float 4s ease-in-out infinite, pulse 3s ease-in-out infinite;
      display: inline-block;
      width: 100%;
      will-change: transform, opacity;
    }

    @keyframes float {
      0%, 100% { transform: translateY(0); }
      50%       { transform: translateY(-7px); }
    }
    @keyframes pulse {
      0%, 100% { opacity: 1; }
      50%       { opacity: .28; }
    }

    /* ── Card ── */
    .card {
      background: var(--card);
      border: 1px solid var(--border);
      border-radius: 20px;
      padding: 2.6rem 2rem 2.2rem;
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 1.1rem;
      box-shadow:
        0 0 0 1px rgba(255,255,255,.04),
        0 8px 40px rgba(0,0,0,.6),
        inset 0 1px 0 rgba(255,255,255,.06);
      position: relative;
      overflow: hidden;
    }

    /* card top shine */
    .card::before {
      content: '';
      position: absolute;
      top: 0; left: 10%; right: 10%;
      height: 1px;
      background: linear-gradient(90deg, transparent, var(--accent1), var(--accent2), transparent);
      opacity: .6;
    }

    /* ── Avatar ── */
    .avatar-wrap {
      position: relative;
      width: 130px; height: 130px;
      flex-shrink: 0;
    }

    .avatar-ring {
      position: absolute; inset: -4px;
      border-radius: 50%;
      background: conic-gradient(var(--accent1), var(--accent2), var(--accent3), var(--accent1));
      animation: spin 6s linear infinite;
      transition: filter .4s;
    }
    .avatar-wrap:hover .avatar-ring {
      filter: brightness(1.5) drop-shadow(0 0 10px var(--accent1));
      animation-duration: 2s;
    }

    @keyframes spin { to { transform: rotate(360deg); } }

    .avatar-bg {
      position: absolute; inset: 3px;
      border-radius: 50%;
      background: var(--card);
    }

    .avatar-img {
      position: absolute; inset: 6px;
      border-radius: 50%;
      object-fit: cover;
      width: calc(100% - 12px);
      height: calc(100% - 12px);
      transition: transform .4s, filter .4s;
    }
    .avatar-wrap:hover .avatar-img {
      transform: scale(1.06);
      filter: brightness(1.12) saturate(1.2);
    }

    /* ── Name ── */
    .name {
      font-family: 'Cinzel Decorative', serif;
      font-size: 1.55rem;
      font-weight: 700;
      background: linear-gradient(135deg, var(--accent1) 0%, #e8d8a0 50%, var(--accent2) 100%);
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
      background-clip: text;
      letter-spacing: .04em;
      text-align: center;
      line-height: 1.2;
    }

    /* ── Divider ── */
    .divider {
      width: 80%;
      height: 1px;
      background: linear-gradient(90deg, transparent, var(--border), transparent);
      margin: .2rem 0;
    }

    /* ── Contact rows ── */
    .contacts {
      display: flex;
      flex-direction: column;
      gap: .55rem;
      width: 100%;
    }

    .contact-item {
      display: flex;
      align-items: center;
      gap: .75rem;
      padding: .55rem .85rem;
      border-radius: 10px;
      border: 1px solid var(--border);
      background: rgba(255,255,255,.025);
      transition: background .25s, border-color .25s, box-shadow .25s;
      text-decoration: none;
      color: var(--text);
      font-size: .92rem;
      font-weight: 500;
      letter-spacing: .03em;
    }
    .contact-item:hover {
      background: rgba(255,255,255,.055);
      border-color: var(--accent1);
      box-shadow: 0 0 14px var(--glow1);
      color: var(--accent1);
    }

    .contact-icon {
      width: 34px; height: 34px;
      display: flex; align-items: center; justify-content: center;
      border-radius: 8px;
      background: rgba(255,255,255,.04);
      flex-shrink: 0;
    }
    .contact-icon svg { display: block; }

    /* ── Social row ── */
    .socials {
      display: flex;
      gap: 1rem;
      margin-top: .4rem;
    }

    .social-btn {
      display: flex;
      align-items: center;
      gap: .55rem;
      padding: .6rem 1.1rem;
      border-radius: 12px;
      border: 1px solid var(--border);
      background: rgba(255,255,255,.03);
      text-decoration: none;
      color: var(--muted);
      font-family: 'Share Tech Mono', monospace;
      font-size: .78rem;
      letter-spacing: .12em;
      text-transform: uppercase;
      transition: all .3s;
      flex: 1;
      justify-content: center;
    }
    .social-btn:hover {
      color: var(--text);
      background: rgba(255,255,255,.07);
    }
    .social-btn.fb:hover {
      border-color: #5a6080;
      box-shadow: 0 0 16px rgba(90,96,160,.45);
      color: #8898cc;
    }
    .social-btn.yt:hover {
      border-color: #703030;
      box-shadow: 0 0 16px rgba(140,50,50,.45);
      color: #cc6666;
    }

    /* ── Phone icon inline SVG ── */
    .icon-phone { stroke: var(--accent1); fill: none; }
    .icon-mail  { stroke: var(--accent1); fill: none; }

    /* ── Footer line ── */
    .footer {
      margin-top: 1.8rem;
      font-family: 'Share Tech Mono', monospace;
      font-size: .68rem;
      color: var(--muted);
      letter-spacing: .14em;
      text-align: center;
      opacity: .5;
    }
  </style>
</head>
